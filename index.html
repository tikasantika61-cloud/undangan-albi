<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walimatul Khitan Muhammad Albiansyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS SAMA SEPERTI SEBELUMNYA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f1ea; color: #333; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png'); opacity: 0.3; z-index: -1; }
        .wrapper { max-width: 550px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 8px solid #d4af37; position: relative; text-align: center; }
        .nama-anak { font-family: 'Great Vibes', cursive; font-size: 4em; color: #d4af37; margin: 20px 0; }
        .detail-box { background: #fdfcf9; border: 1px solid #e0e0e0; padding: 25px; border-radius: 15px; margin: 30px 0; }
        .btn-calendar { display: inline-block; padding: 12px 25px; background: #d4af37; color: white; text-decoration: none; border-radius: 25px; font-weight: 600; margin-top: 20px; }
        
        /* --- STYLE BARU: TOMBOL MUSIK --- */
        .music-control {
            position: fixed; bottom: 20px; right: 20px;
            background: #d4af37; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000; font-size: 20px;
            border: 2px solid #fff;
        }
        .music-icon.playing { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
